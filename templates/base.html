<!-- templates/base.html -->
<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        .navbar {
          background-color: #333;
          padding: 10px;
        }

        .navbar ul {
          list-style: none;
          display: flex;
          gap: 20px;
          margin: 0;
          padding: 0;
        }

        .navbar li {
        }

        .navbar a {
          color: white;
          text-decoration: none;
        }

        .navbar a.current {
          color: yellow;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            display: flex;
            gap: 40px;
        }
        .left {
            flex: 1;
        }
        .right {
            flex: 1;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
        }
        input, select, button {
            margin-top: 5px;
            padding: 8px;
            font-size: 14px;
        }
        button {
            margin-top: 20px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-left: 4px solid #333;
        }
        .trace-box {
            margin-top: 20px;
            padding: 14px 16px;
            background: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 6px;
            max-height: 420px;
            overflow-y: auto;
        }
        .trace-box h3 {
            margin-top: 0;
        }
        .trace-overview {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .trace-idea {
            margin: 0 0 12px 0;
            padding-left: 1.2em;
            font-size: 14px;
            line-height: 1.5;
        }
        .trace-idea li {
            margin: 6px 0;
        }
        .trace-step {
            font-size: 13px;
            margin: 10px 0;
            padding: 8px 10px;
            background: #fff;
            border-left: 3px solid #2a6;
            line-height: 1.5;
        }
        .trace-step.skip {
            border-left-color: #888;
            color: #555;
        }
        .trace-step.note {
            border-left-color: #c60;
        }
        .trace-formula {
            font-family: ui-monospace, monospace;
            margin-top: 4px;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
