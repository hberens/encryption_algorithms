<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title|default('Cipher lab') }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf8fc;
            --bg-dots: #f3e8f0;
            --surface: #ffffff;
            --text: #3d3550;
            --text-soft: #6b6080;
            --accent: #b388eb;
            --accent-dark: #8b6bc9;
            --accent-soft: #ede5f9;
            --mint: #8ed4b9;
            --mint-soft: #e6f5ef;
            --coral: #f4a4a4;
            --coral-soft: #fdeeee;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(91, 71, 120, 0.08);
            --shadow-nav: 0 2px 16px rgba(91, 71, 120, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Nunito", system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.55;
            color: var(--text);
            background-color: var(--bg);
            background-image:
                radial-gradient(var(--bg-dots) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }

        .navbar {
            background: var(--surface);
            padding: 14px 28px;
            box-shadow: var(--shadow-nav);
            border-bottom: 1px solid rgba(179, 136, 235, 0.15);
        }

        .navbar ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin: 0 auto;
            padding: 0;
            max-width: 1100px;
            align-items: center;
        }

        .navbar a {
            color: var(--text-soft);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 999px;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }

        .navbar a:hover {
            background: var(--accent-soft);
            color: var(--accent-dark);
        }

        .navbar a.current {
            background: linear-gradient(135deg, var(--accent) 0%, #c9a8f0 100%);
            color: #fff;
            box-shadow: 0 2px 12px rgba(179, 136, 235, 0.45);
        }

        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px 48px;
        }

        .content > h1:first-child {
            font-weight: 700;
            font-size: 1.85rem;
            color: var(--text);
            margin: 0 0 12px;
            letter-spacing: -0.02em;
        }

        .container {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .left, .right {
            flex: 1 1 320px;
            min-width: 0;
        }

        .left h2, .left h3, .right h2, .right h3 {
            font-weight: 700;
            color: var(--text);
            margin-top: 0;
        }

        .left h2 { font-size: 1.35rem; }
        .left h3 { font-size: 1.1rem; margin-top: 1.25rem; }

        .left p, .right p {
            color: var(--text-soft);
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
            background: var(--surface);
            padding: 22px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(179, 136, 235, 0.12);
        }

        label {
            margin-top: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        label:first-of-type {
            margin-top: 0;
        }

        input, select, textarea {
            margin-top: 6px;
            padding: 11px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            width: 100%;
            max-width: 100%;
            border: 2px solid #e8e0ef;
            border-radius: var(--radius-sm);
            background: #fefcff;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button, input[type="submit"] {
            margin-top: 20px;
            padding: 12px 22px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, #9d7ad4 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(179, 136, 235, 0.4);
            transition: transform 0.15s, box-shadow 0.2s;
        }

        button:hover, input[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(179, 136, 235, 0.5);
        }

        button[type="submit"][name="generate"], button.secondary {
            background: var(--surface);
            color: var(--accent-dark);
            border: 2px solid var(--accent);
            box-shadow: none;
        }

        button[type="submit"][name="generate"]:hover {
            background: var(--accent-soft);
        }

        .rsa-output {
            word-break: break-all;
            white-space: pre-wrap;
        }

        .result {
            margin-top: 20px;
            padding: 16px 18px;
            background: var(--mint-soft);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(142, 212, 185, 0.35);
            box-shadow: 0 2px 12px rgba(142, 212, 185, 0.12);
        }

        .result h3 {
            margin: 0 0 8px;
            font-size: 1rem;
            color: #2d6b52;
        }

        .trace-box {
            margin-top: 20px;
            padding: 16px 18px;
            background: var(--surface);
            border: 1px solid rgba(179, 136, 235, 0.2);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .trace-box h3 {
            margin-top: 0;
            color: var(--accent-dark);
            font-size: 1.1rem;
        }

        .trace-overview {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 6px;
        }

        .trace-idea {
            margin: 0 0 12px 0;
            padding-left: 1.2em;
            font-size: 0.92rem;
            line-height: 1.55;
            color: var(--text-soft);
        }

        .trace-idea li {
            margin: 4px 0;
        }

        .trace-step {
            font-size: 0.9rem;
            margin: 10px 0;
            padding: 10px 12px;
            background: var(--accent-soft);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--mint);
            line-height: 1.5;
            color: var(--text);
        }

        .trace-step.skip {
            background: #f5f3f8;
            border-left-color: #b8b0c4;
            color: var(--text-soft);
        }

        .trace-step.note {
            background: var(--coral-soft);
            border-left-color: var(--coral);
        }

        .trace-formula {
            font-family: "JetBrains Mono", ui-monospace, monospace;
            font-size: 0.85rem;
            margin-top: 6px;
            color: var(--text);
        }

        .toggle-options {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 8px 0;
        }

        .toggle-options label {
            margin-top: 0;
            font-weight: 600;
            cursor: pointer;
        }

        .result-text {
            width: 100%;
            min-height: 120px;
            margin-top: 8px;
            font-family: "JetBrains Mono", ui-monospace, monospace;
            font-size: 0.85rem;
            line-height: 1.45;
        }

        .download-row {
            margin-top: 14px;
        }

        .download-row a {
            font-weight: 700;
            color: var(--accent-dark);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            display: inline-block;
            transition: background 0.2s;
        }

        .download-row a:hover {
            background: #ddd0f0;
        }

        code {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.88em;
            background: var(--accent-soft);
            padding: 2px 6px;
            border-radius: 6px;
            color: var(--accent-dark);
        }

        .crypto-grid {
            list-style: none;
            padding: 0;
            margin: 0;

            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .crypto-grid li {
            flex: 1;
        }

        .crypto-grid a {
            display: block;
            padding: 24px;
            text-align: center;
            text-decoration: none;

            background: white;
            border-radius: 12px;

            /* smooth animation */
            transition: transform 0.2s ease, box-shadow 0.2s ease;

            /* subtle base shadow */
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        /* ✨ hover effect */
        .crypto-grid a:hover {
            transform: scale(1.05); /* grow */
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); /* stronger shadow */
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
